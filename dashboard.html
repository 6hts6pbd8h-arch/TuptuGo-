<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuptuGo - Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <header class="dashboard-header">

        <div>
            <p>👋 Dzień dobry</p>
            <h1>Dokąd dziś jedziemy?</h1>
        </div>

        <div class="avatar">
            M
        </div>

    </header>

    <div class="search-dashboard">

    <input
        type="text"
        id="citySearch"
        placeholder="🔍 Wpisz miasto..."
    >

</div>

<div class="quick-cities">

    <button class="city-btn">Warszawa</button>
    <button class="city-btn">Kraków</button>
    <button class="city-btn">Gdańsk</button>
    <button class="city-btn">Wrocław</button>

</div>

    <div class="dashboard-grid">

        <a class="dashboard-card" href="#">
            🗺️
            <h3>Atrakcje</h3>
            <p>Najciekawsze miejsca.</p>
        </a>

        <a class="dashboard-card" href="#">
            🍽️
            <h3>Restauracje</h3>
            <p>Polecane lokale.</p>
        </a>

        <a class="dashboard-card" href="#">
            🏛️
            <h3>Historia</h3>
            <p>Poznaj miasto.</p>
        </a>

        <a class="dashboard-card" href="#">
            🤖
            <h3>AI Planner</h3>
            <p>Zaplanuj wyjazd.</p>
        </a>

    </div>

</div>

</body>
</html>
