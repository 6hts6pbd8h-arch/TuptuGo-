<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuptuGo - Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <header class="dashboard-header">

        <div>
            <p>👋 Dzień dobry</p>
            <h1>Dokąd dziś jedziemy?</h1>
        </div>

        <div class="avatar">
            M
        </div>

    </header>

    <div class="search-dashboard">

        <input
            type="text"
            id="citySearch"
            placeholder="🔍 Wpisz miasto..."
        >

    </div>

    <div class="quick-cities">

        <button class="city-btn">Warszawa</button>
        <button class="city-btn">Kraków</button>
        <button class="city-btn">Gdańsk</button>
        <button class="city-btn">Wrocław</button>

    </div>

    <div class="dashboard-grid">

        <a class="dashboard-card" href="#">
            🗺️
            <h3>Atrakcje</h3>
            <p>Najciekawsze miejsca.</p>
        </a>

        <a class="dashboard-card" href="#">
            🍽️
            <h3>Restauracje</h3>
            <p>Polecane lokale.</p>
        </a>

        <a class="dashboard-card" href="#">
            🏛️
            <h3>Historia</h3>
            <p>Poznaj miasto.</p>
        </a>

        <a class="dashboard-card" href="#">
            🤖
            <h3>AI Planner</h3>
            <p>Zaplanuj wyjazd.</p>
        </a>

    </div>

    <section class="recent-section">

        <h2>Ostatnie podróże</h2>

        <div class="recent-grid">

            <div class="recent-card">
                <img src="https://picsum.photos/600/350?random=1">
                <h3>Warszawa</h3>
                <p>12 atrakcji • 248 restauracji</p>
            </div>

            <div class="recent-card">
                <img src="https://picsum.photos/600/350?random=2">
                <h3>Kraków</h3>
                <p>Wawel • Kazimierz • Rynek</p>
            </div>

            <div class="recent-card">
                <img src="https://picsum.photos/600/350?random=3">
                <h3>Gdańsk</h3>
                <p>Motława • Długi Targ</p>
            </div>

        </div>

    </section>

</div>

<script src="app.js"></script>

</body>
</html>
